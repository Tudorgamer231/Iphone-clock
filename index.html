<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iPhone Clock</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
      color: #fff;
      user-select: none;
    }

    @keyframes breathe {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.78; }
    }
    @keyframes ccSlideIn {
      from { opacity: 0; transform: translate(-50%, -48%) scale(0.94); }
      to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    /* STATUS BAR */
    #status-bar {
      position: fixed; top: 14px; right: 16px;
      display: flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,0.4); font-size: 12px;
      cursor: pointer; padding: 4px 8px; border-radius: 8px;
      transition: background 0.2s; z-index: 10;
    }
    #status-bar:hover { background: rgba(255,255,255,0.07); }
    #status-bar svg { display: block; }

    /* CLOCK WRAPPER */
    #app {
      position: fixed; inset: 0;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: default; padding: 0 16px;
    }

    #clock-area {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
      animation: breathe 4s ease-in-out infinite;
      width: 100%;
    }

    /* DIGITAL */
    #digits-row {
      display: flex; flex-direction: row;
      align-items: center; justify-content: center;
      gap: 0;
    }
    .digit-pair { display: flex; flex-direction: row; align-items: center; }
    .flip-digit {
      display: inline-flex; align-items: center; justify-content: center;
      width: 0.6em;
      line-height: 1;
      transition: opacity 0.18s ease, transform 0.18s ease, color 0.4s ease, font-size 0.3s ease, font-weight 0.3s ease;
    }
    .flip-digit.fading {
      opacity: 0;
      transform: scale(0.9) translateY(-6px);
    }
    #colon {
      line-height: 1;
      width: 0.3em;
      text-align: center;
      flex-shrink: 0;
      margin-bottom: 0.12em;
      transition: opacity 0.4s ease, color 0.4s ease;
    }

    #seconds-row {
      display: flex; flex-direction: row;
      align-items: center; justify-content: center;
      gap: 10px;
    }
    .sec-line { height: 1px; width: 32px; background: rgba(255,255,255,0.07); }

    #date-label {
      color: rgba(255,255,255,0.22);
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      transition: color 0.4s;
      white-space: nowrap;
    }

    /* ANALOG */
    #analog-wrap { display: none; flex-direction: column; align-items: center; gap: 16px; }
    #analog-wrap svg { width: min(60vw, 300px); height: min(60vw, 300px); }

    /* SETTINGS PANEL */
    #settings-wrap {
      width: 100%;
      display: flex; justify-content: center;
      padding-bottom: 28px;
      flex-shrink: 0;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      pointer-events: none;
    }
    #settings-wrap.visible {
      opacity: 1; transform: translateY(0); pointer-events: auto;
    }

    #settings-panel {
      background: rgba(28,28,30,0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 20px 24px;
      width: min(90vw, 360px);
      z-index: 100;
    }
    .panel-title {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.35);
      margin-bottom: 16px;
      text-transform: uppercase;
    }
    .panel-label {
      font-size: 12px; color: rgba(255,255,255,0.5);
      display: flex; justify-content: space-between;
      margin-bottom: 8px;
    }
    .panel-label span.val { color: #fff; }
    .panel-section { margin-bottom: 18px; }
    .range-hints {
      display: flex; justify-content: space-between;
      font-size: 10px; color: rgba(255,255,255,0.2); margin-top: 2px;
    }
    input[type=range] { width: 100%; cursor: pointer; }

    #color-palette { display: flex; gap: 10px; flex-wrap: wrap; }
    .color-dot {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.15s ease;
    }
    .color-dot.active {
      border-color: #fff;
      outline: 2px solid rgba(255,255,255,0.4);
      outline-offset: 2px;
      transform: scale(1.2);
    }

    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .toggle-label { font-size: 13px; color: rgba(255,255,255,0.7); }
    .toggle-btn {
      width: 48px; height: 28px; border-radius: 14px;
      background: rgba(255,255,255,0.12);
      border: none; cursor: pointer; position: relative;
      transition: background 0.3s ease;
    }
    .toggle-knob {
      position: absolute; top: 3px; left: 3px;
      width: 22px; height: 22px; border-radius: 50%;
      background: #fff;
      transition: left 0.3s ease;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    .toggle-btn.on .toggle-knob { left: 23px; }

    /* HINT */
    #hint {
      position: absolute; bottom: 16px;
      color: rgba(255,255,255,0.08); font-size: 10px;
      letter-spacing: 0.18em; text-transform: uppercase;
      transition: opacity 0.3s;
    }
    #hint.hidden { opacity: 0; pointer-events: none; }

    /* CONTROL CENTER */
    #cc-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(2px);
    }
    #cc-overlay.visible { display: block; }

    #cc-panel {
      display: none;
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: min(92vw, 340px);
      max-height: 85vh; overflow-y: auto;
      background: rgba(28,28,30,0.94);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 20px 20px 24px;
      z-index: 1000;
      animation: ccSlideIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    #cc-panel.visible { display: block; }

    .cc-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .cc-title { font-size: 15px; font-weight: 700; letter-spacing: 0.02em; }
    .cc-close {
      background: rgba(255,255,255,0.1); border: none;
      border-radius: 50%; width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #fff; font-size: 14px; line-height: 1;
    }
    .cc-section {
      background: rgba(255,255,255,0.06);
      border-radius: 16px; padding: 14px 16px; margin-bottom: 10px;
    }
    .cc-sec-label {
      font-size: 11px; color: rgba(255,255,255,0.4); font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px;
    }
    .cc-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .cc-key { font-size: 12px; color: rgba(255,255,255,0.45); }
    .cc-val { font-size: 12px; color: rgba(255,255,255,0.7); font-weight: 500; text-align: right; max-width: 55%; word-break: break-all; }
    .cc-big { font-size: 14px; color: #fff; font-weight: 500; }
    .cc-sub { font-size: 12px; color: rgba(255,255,255,0.45); margin-top: 2px; }
    .cc-net-row { display: flex; align-items: center; gap: 10px; }
  </style>
</head>
<body>

<!-- STATUS BAR -->
<div id="status-bar" title="System Info">
  <!-- signal -->
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2 20h.01M7 20v-4M12 20v-8M17 20V8M22 4v16"/>
  </svg>
  <!-- wifi -->
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
  </svg>
  <!-- battery -->
  <span id="battery-pct">--%</span>
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="1" y="6" width="18" height="12" rx="2" ry="2"/><line x1="23" y1="13" x2="23" y2="11"/>
  </svg>
</div>

<!-- CONTROL CENTER OVERLAY -->
<div id="cc-overlay"></div>
<div id="cc-panel">
  <div class="cc-header">
    <span class="cc-title">System Info</span>
    <button class="cc-close" id="cc-close">✕</button>
  </div>
  <!-- time -->
  <div class="cc-section">
    <div class="cc-sec-label">Timp local</div>
    <div class="cc-big" id="cc-time"></div>
    <div class="cc-sub" id="cc-date-long"></div>
  </div>
  <!-- display -->
  <div class="cc-section">
    <div class="cc-sec-label">Display</div>
    <div class="cc-row"><span class="cc-key">Rezoluție</span><span class="cc-val" id="cc-res"></span></div>
    <div class="cc-row"><span class="cc-key">Pixel Ratio</span><span class="cc-val" id="cc-dpr"></span></div>
  </div>
  <!-- network -->
  <div class="cc-section">
    <div class="cc-sec-label">Rețea</div>
    <div class="cc-net-row">
      <svg id="cc-wifi-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#30D158" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
      </svg>
      <div>
        <div class="cc-big" id="cc-online"></div>
        <div class="cc-sub" id="cc-conn"></div>
      </div>
    </div>
  </div>
  <!-- system -->
  <div class="cc-section">
    <div class="cc-sec-label">Sistem</div>
    <div class="cc-row"><span class="cc-key">Platformă</span><span class="cc-val" id="cc-platform"></span></div>
    <div class="cc-row"><span class="cc-key">Browser</span><span class="cc-val" id="cc-browser"></span></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <!-- DIGITAL CLOCK -->
  <div id="clock-area">
    <div id="digital-wrap">
      <div id="digits-row">
        <div class="digit-pair">
          <span class="flip-digit" id="h0"></span>
          <span class="flip-digit" id="h1"></span>
        </div>
        <span id="colon">:</span>
        <div class="digit-pair">
          <span class="flip-digit" id="m0"></span>
          <span class="flip-digit" id="m1"></span>
        </div>
      </div>

      <div id="seconds-row">
        <div class="sec-line"></div>
        <div class="digit-pair">
          <span class="flip-digit" id="s0" style="color:rgba(255,255,255,0.22);font-size:5vw;font-weight:300;"></span>
          <span class="flip-digit" id="s1" style="color:rgba(255,255,255,0.22);font-size:5vw;font-weight:300;"></span>
        </div>
        <div class="sec-line"></div>
      </div>

      <p id="date-label"></p>
    </div>

    <!-- ANALOG CLOCK -->
    <div id="analog-wrap">
      <svg id="analog-svg" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
        <circle cx="150" cy="150" r="140" fill="none" id="analog-ring" stroke-width="2"/>
        <g id="analog-markers"></g>
        <g id="analog-numbers"></g>
        <line id="hand-hour"   x1="150" y1="150" x2="150" y2="70"  stroke-width="5"   stroke-linecap="round"/>
        <line id="hand-minute" x1="150" y1="150" x2="150" y2="45"  stroke="#FFFFFF" stroke-width="3"   stroke-linecap="round"/>
        <line id="hand-second" x1="150" y1="170" x2="150" y2="35"  stroke="#FF453A" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="150" cy="150" r="5" fill="#FF453A"/>
        <circle cx="150" cy="150" r="2" fill="#000"/>
      </svg>
      <p id="analog-date" style="color:rgba(255,255,255,0.22);font-size:1.2vw;letter-spacing:0.22em;text-transform:uppercase;white-space:nowrap;"></p>
    </div>
  </div>

  <!-- SETTINGS PANEL -->
  <div id="settings-wrap">
    <div id="settings-panel">
      <p class="panel-title">Setări ceas</p>

      <!-- Color -->
      <div class="panel-section">
        <label class="panel-label">Culoare</label>
        <div id="color-palette"></div>
      </div>

      <!-- Font weight -->
      <div class="panel-section">
        <label class="panel-label">Grosime font <span class="val" id="fw-val">100</span></label>
        <input type="range" id="fw-range" min="100" max="900" step="100" value="100">
        <div class="range-hints"><span>Thin</span><span>Heavy</span></div>
      </div>

      <!-- Font size -->
      <div class="panel-section">
        <label class="panel-label">Mărime font <span class="val" id="fs-val">17vw</span></label>
        <input type="range" id="fs-range" min="8" max="28" step="1" value="17">
        <div class="range-hints"><span>Mic</span><span>Mare</span></div>
      </div>

      <!-- Analog toggle -->
      <div class="toggle-row">
        <span class="toggle-label">Mod analogic</span>
        <button class="toggle-btn" id="analog-toggle">
          <span class="toggle-knob"></span>
        </button>
      </div>
    </div>
  </div>

  <p id="hint">Atinge pentru setări</p>
</div>

<script>
  // ── SETTINGS STATE ──
  const state = {
    color: '#FF9F0A',
    fontWeight: 100,
    fontSize: 17,
    analog: false,
  };

  const COLORS = [
    { label: 'Alb',        value: '#FFFFFF' },
    { label: 'Galben',     value: '#FFD60A' },
    { label: 'Portocaliu', value: '#FF9F0A' },
    { label: 'Albastru',   value: '#0A84FF' },
    { label: 'Verde',      value: '#30D158' },
    { label: 'Roz',        value: '#FF375F' },
    { label: 'Roșu',       value: '#FF453A' },
    { label: 'Violet',     value: '#BF5AF2' },
  ];

  const DAYS   = ['Duminică','Luni','Marți','Miercuri','Joi','Vineri','Sâmbătă'];
  const MONTHS = ['Ianuarie','Februarie','Martie','Aprilie','Mai','Iunie','Iulie','August','Septembrie','Octombrie','Noiembrie','Decembrie'];

  // ── DOM REFS ──
  const $  = id => document.getElementById(id);
  const digits = {
    h0: $('h0'), h1: $('h1'),
    m0: $('m0'), m1: $('m1'),
    s0: $('s0'), s1: $('s1'),
  };
  const prevDigits = { h0:'', h1:'', m0:'', m1:'', s0:'', s1:'' };

  // ── BUILD COLOR PALETTE ──
  const palette = $('color-palette');
  COLORS.forEach(c => {
    const btn = document.createElement('div');
    btn.className = 'color-dot' + (c.value === state.color ? ' active' : '');
    btn.style.background = c.value;
    btn.title = c.label;
    btn.addEventListener('click', e => { e.stopPropagation(); setColor(c.value); });
    palette.appendChild(btn);
  });

  function setColor(val) {
    state.color = val;
    applyStyles();
    document.querySelectorAll('.color-dot').forEach(d => {
      d.classList.toggle('active', d.style.background === hexToRgb(val) || d.style.background === val);
    });
    // re-render analog markers with new color
    buildAnalogMarkers();
    resetHideTimer();
  }

  function hexToRgb(hex) {
    // browsers store color-dot background as rgb() — compare by value attr
    return hex;
  }
  // fix: compare by data
  COLORS.forEach((c, i) => {
    const dot = palette.children[i];
    dot.dataset.color = c.value;
    dot.addEventListener('click', e => { e.stopPropagation(); setColor(c.value); palette.querySelectorAll('.color-dot').forEach(d => d.classList.toggle('active', d.dataset.color === c.value)); resetHideTimer(); });
  });
  // remove duplicate listeners by rebuilding properly
  palette.innerHTML = '';
  COLORS.forEach(c => {
    const btn = document.createElement('div');
    btn.className = 'color-dot' + (c.value === state.color ? ' active' : '');
    btn.style.background = c.value;
    btn.dataset.color = c.value;
    btn.title = c.label;
    btn.addEventListener('click', e => {
      e.stopPropagation();
      state.color = c.value;
      palette.querySelectorAll('.color-dot').forEach(d => d.classList.toggle('active', d.dataset.color === c.value));
      applyStyles();
      buildAnalogMarkers();
      resetHideTimer();
    });
    palette.appendChild(btn);
  });

  // ── FONT WEIGHT SLIDER ──
  $('fw-range').addEventListener('input', e => {
    state.fontWeight = Number(e.target.value);
    $('fw-val').textContent = state.fontWeight;
    applyStyles();
    resetHideTimer();
  });

  // ── FONT SIZE SLIDER ──
  $('fs-range').addEventListener('input', e => {
    state.fontSize = Number(e.target.value);
    $('fs-val').textContent = state.fontSize + 'vw';
    applyStyles();
    resetHideTimer();
  });

  // ── ANALOG TOGGLE ──
  $('analog-toggle').addEventListener('click', e => {
    e.stopPropagation();
    state.analog = !state.analog;
    $('analog-toggle').classList.toggle('on', state.analog);
    $('analog-toggle').style.background = state.analog ? state.color : 'rgba(255,255,255,0.12)';
    $('digital-wrap').style.display = state.analog ? 'none' : 'block';
    $('analog-wrap').style.display  = state.analog ? 'flex'  : 'none';
    resetHideTimer();
  });

  function applyStyles() {
    const fSize   = state.fontSize + 'vw';
    const secSize = Math.max(state.fontSize * 0.45, 3) + 'vw';
    const c = state.color;
    const fw = state.fontWeight;

    ['h0','h1','m0','m1'].forEach(id => {
      digits[id].style.color      = c;
      digits[id].style.fontSize   = fSize;
      digits[id].style.fontWeight = fw;
    });
    ['s0','s1'].forEach(id => {
      digits[id].style.fontSize = secSize;
    });

    $('colon').style.color      = c;
    $('colon').style.fontSize   = fSize;
    $('colon').style.fontWeight = fw;

    $('date-label').style.fontSize = Math.max(state.fontSize * 0.09, 0.9) + 'vw';

    // analog color
    const hand = $('hand-hour');
    if (hand) {
      hand.setAttribute('stroke', c);
      $('analog-ring').setAttribute('stroke', c + '22');
    }

    $('fw-range').style.accentColor = c;
    $('fs-range').style.accentColor = c;
    $('analog-toggle').style.background = state.analog ? c : 'rgba(255,255,255,0.12)';
  }

  // ── ANALOG MARKERS ──
  function buildAnalogMarkers() {
    const markersG  = $('analog-markers');
    const numbersG  = $('analog-numbers');
    markersG.innerHTML = '';
    numbersG.innerHTML = '';

    for (let i = 0; i < 60; i++) {
      const isHour = i % 5 === 0;
      const angle  = (i * 6 - 90) * Math.PI / 180;
      const r1 = isHour ? 120 : 126;
      const r2 = 134;
      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1', 150 + r1 * Math.cos(angle));
      line.setAttribute('y1', 150 + r1 * Math.sin(angle));
      line.setAttribute('x2', 150 + r2 * Math.cos(angle));
      line.setAttribute('y2', 150 + r2 * Math.sin(angle));
      line.setAttribute('stroke', isHour ? state.color : 'rgba(255,255,255,0.15)');
      line.setAttribute('stroke-width', isHour ? 3 : 1);
      line.setAttribute('stroke-linecap','round');
      markersG.appendChild(line);
    }

    for (let i = 0; i < 12; i++) {
      const num   = i === 0 ? 12 : i;
      const angle = (i * 30 - 90) * Math.PI / 180;
      const r = 104;
      const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x', 150 + r * Math.cos(angle));
      txt.setAttribute('y', 150 + r * Math.sin(angle));
      txt.setAttribute('text-anchor','middle');
      txt.setAttribute('dominant-baseline','central');
      txt.setAttribute('fill', state.color);
      txt.setAttribute('font-size','18');
      txt.setAttribute('font-weight','600');
      txt.setAttribute('font-family','-apple-system, sans-serif');
      txt.textContent = num;
      numbersG.appendChild(txt);
    }
  }
  buildAnalogMarkers();

  // ── FLIP DIGIT ──
  function updateDigit(el, newVal) {
    if (el.textContent === newVal) return;
    el.classList.add('fading');
    setTimeout(() => {
      el.textContent = newVal;
      el.classList.remove('fading');
    }, 180);
  }

  // ── CLOCK TICK ──
  function tick() {
    const now = new Date();
    const h = now.getHours().toString().padStart(2,'0');
    const m = now.getMinutes().toString().padStart(2,'0');
    const s = now.getSeconds().toString().padStart(2,'0');

    updateDigit(digits.h0, h[0]);
    updateDigit(digits.h1, h[1]);
    updateDigit(digits.m0, m[0]);
    updateDigit(digits.m1, m[1]);
    updateDigit(digits.s0, s[0]);
    updateDigit(digits.s1, s[1]);

    // colon blink
    $('colon').style.opacity = now.getSeconds() % 2 === 0 ? '1' : '0.15';

    // date
    const dateStr = `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}`;
    $('date-label').textContent  = dateStr;
    $('analog-date').textContent = dateStr;

    // analog hands
    const sec = now.getSeconds();
    const min = now.getMinutes();
    const hr  = now.getHours() % 12;
    const secDeg = sec * 6;
    const minDeg = min * 6 + sec * 0.1;
    const hrDeg  = hr * 30 + min * 0.5;

    $('hand-hour').setAttribute('transform',  `rotate(${hrDeg}, 150, 150)`);
    $('hand-minute').setAttribute('transform',`rotate(${minDeg}, 150, 150)`);
    $('hand-second').setAttribute('transform',`rotate(${secDeg}, 150, 150)`);

    // CC time
    if ($('cc-panel').classList.contains('visible')) {
      $('cc-time').textContent = now.toLocaleTimeString('ro-RO');
      $('cc-date-long').textContent = now.toLocaleDateString('ro-RO', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
    }
  }
  setInterval(tick, 1000);
  tick();

  // ── SETTINGS PANEL TOGGLE ──
  let hideTimer = null;
  function resetHideTimer() {
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
      $('settings-wrap').classList.remove('visible');
      $('hint').classList.remove('hidden');
    }, 5000);
  }

  $('app').addEventListener('click', e => {
    if (e.target.closest('#settings-wrap') || e.target.closest('#status-bar') || e.target.closest('#cc-panel')) return;
    const visible = $('settings-wrap').classList.toggle('visible');
    $('hint').classList.toggle('hidden', visible);
    if (visible) resetHideTimer();
    else clearTimeout(hideTimer);
  });

  $('settings-wrap').addEventListener('click', e => e.stopPropagation());

  // ── CONTROL CENTER ──
  function openCC() {
    // populate static info
    $('cc-res').textContent  = `${screen.width} × ${screen.height}`;
    $('cc-dpr').textContent  = `${window.devicePixelRatio}×`;
    $('cc-online').textContent = navigator.onLine ? 'Conectat' : 'Offline';
    $('cc-wifi-icon').setAttribute('stroke', navigator.onLine ? '#30D158' : '#FF453A');

    const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
    $('cc-conn').textContent = conn ? `${(conn.effectiveType || conn.type || '').toUpperCase()}${conn.downlink ? ' · ' + conn.downlink + ' Mbps' : ''}` : '';

    $('cc-platform').textContent = navigator.userAgentData?.platform || navigator.platform || 'Unknown';
    const brands = navigator.userAgentData?.brands?.filter(b => !b.brand.includes('Not')).map(b => b.brand).join(', ');
    $('cc-browser').textContent  = brands || navigator.userAgent.split(' ').pop();

    $('cc-overlay').classList.add('visible');
    $('cc-panel').classList.add('visible');

    // live time
    $('cc-time').textContent = new Date().toLocaleTimeString('ro-RO');
    $('cc-date-long').textContent = new Date().toLocaleDateString('ro-RO', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  }

  function closeCC() {
    $('cc-overlay').classList.remove('visible');
    $('cc-panel').classList.remove('visible');
  }

  $('status-bar').addEventListener('click', e => { e.stopPropagation(); openCC(); });
  $('cc-close').addEventListener('click', closeCC);
  $('cc-overlay').addEventListener('click', closeCC);

  // ── BATTERY ──
  if (navigator.getBattery) {
    navigator.getBattery().then(b => {
      const update = () => $('battery-pct').textContent = Math.round(b.level * 100) + '%';
      update();
      b.addEventListener('levelchange', update);
    }).catch(() => { $('battery-pct').textContent = ''; });
  }

  // ── INIT STYLES ──
  applyStyles();
</script>
</body>
</html>
